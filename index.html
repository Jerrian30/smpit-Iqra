<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <title>Ujian Informatika</title>
    <style>
      body {
        font-family: "Segoe UI", Tahoma, sans-serif;
        background: linear-gradient(135deg, #4facfe, #00f2fe);
        margin: 0;
        padding: 20px;
      }

      .container {
        max-width: 900px;
        margin: auto;
        background: #ffffff;
        padding: 30px;
        border-radius: 15px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        animation: fadeIn 0.8s ease-in-out;
      }

      h1 {
        text-align: center;
        color: #333;
        margin-bottom: 10px;
      }

      .soal {
        background: #f9fbff;
        padding: 15px;
        border-radius: 10px;
        margin-bottom: 15px;
        border-left: 5px solid #4facfe;
        transition: 0.3s;
      }

      .soal:hover {
        transform: scale(1.01);
        background: #eef6ff;
      }

      .soal p {
        font-weight: 600;
        color: #333;
      }

      label {
        display: block;
        margin: 6px 0;
        padding: 6px;
        border-radius: 6px;
        cursor: pointer;
        transition: 0.2s;
      }

      label:hover {
        background: #e6f0ff;
      }

      input[type="radio"] {
        margin-right: 8px;
      }

      button {
        display: block;
        margin: 20px auto;
        padding: 12px 30px;
        font-size: 16px;
        border: none;
        border-radius: 8px;
        background: linear-gradient(135deg, #4facfe, #00c6ff);
        color: white;
        cursor: pointer;
        transition: 0.3s;
      }

      button:hover {
        transform: scale(1.05);
        background: linear-gradient(135deg, #00c6ff, #4facfe);
      }

      #hasil {
        text-align: center;
        margin-top: 20px;
        font-size: 22px;
        font-weight: bold;
        color: #222;
        padding: 15px;
        border-radius: 10px;
        background: #f1f8ff;
        animation: fadeIn 0.5s ease-in-out;
      }
      label {
        transition: 0.3s;
      }

      label.correct {
        background: #d4edda;
      }

      label.wrong {
        background: #f8d7da;
      }

      /* Animasi */
      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(10px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>Ujian Informatika</h1>
      <div id="soal"></div>
      <button onclick="submitJawaban()">Submit</button>
      <h2 id="hasil"></h2>
    </div>

    <script>

        ],
        ["A. $A1", "B. A$1", "C. $A$1", "D. A1"],
        [
          'A. =IF(A1>75,"Lulus","Tidak")',
          "B. =IF(A1>75,Lulus,Tidak)",
          "C. =IF(A1>75)",
          'D. =IF(A1>75;"Lulus")',
        ],
        [
          'A. =IF(B2="A";"Sangat Baik";IF(B2="B";"Baik";IF(B2="C";"Cukup";"Kurang Baik")))',
          'B. =IF(TRIM(B2)="A";"Sangat Baik";IF(TRIM(B2)="B";"Baik";IF(TRIM(B2)="C";"Cukup";"Kurang Baik")))',
          'C. =IF(B2>="A";"Sangat Baik";IF(B2>="B";"Baik";IF(B2>="C";"Cukup";"Kurang Baik")))',

        ["A. Nilai terkecil", "B. Nilai terbesar", "C. Jumlah", "D. Rata-rata"],

      const jawaban = [
        "C",

      let html = "";
      soal.forEach((s, i) => {
        html += `<div class="soal"><p>${s}</p>`;
        pilihan[i].forEach((p) => {
          html += `<label><input type="radio" name="q${i}" value="${p[0]}"> ${p}</label><br>`;
        });
        html += "</div>";
      });
      document.getElementById("soal").innerHTML = html;

      function submitJawaban() {
        let skor = 0;

        soal.forEach((s, i) => {
          let pilih = document.querySelector(`input[name=q${i}]:checked`);
          let semuaPilihan = document.querySelectorAll(`input[name=q${i}]`);

          semuaPilihan.forEach((p) => {
            p.disabled = true; // biar tidak bisa diubah lagi
            let label = p.parentElement;

            if (p.value === jawaban[i]) {
              label.style.background = "#d4edda"; // hijau (benar)
            }

            if (pilih && p.value === pilih.value && p.value !== jawaban[i]) {
              label.style.background = "#f8d7da"; // merah (salah)
            }
          });

          if (pilih && pilih.value === jawaban[i]) skor++;
        });

        let nilai = Math.round((skor / soal.length) * 100);

        let hasil =
          nilai >= 85
            ? `🎉 Pecah Nian ${nama}! Nilai kamu ${nilai}`
            : `${nama}, Nilai kamu ${nilai}`;

        document.getElementById("hasil").innerText = hasil;
      }
    </script>
  </body>
</html>
